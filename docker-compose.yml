version: '3.8'

services:
  mysql:
    image: mysql
    container_name: mysql_CCM
    environment:
	  MYSQL_DATABASE: quanlilkmt
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"  
      MYSQL_ROOT_HOST: "%"  
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql 
      - ./database/dbdeploy.sql:/docker-entrypoint-initdb.d/init.sql 
    command: --default-authentication-plugin=mysql_native_password  
